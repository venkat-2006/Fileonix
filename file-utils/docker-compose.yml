services:

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "4000:4000"
    volumes:
      - ./backend/uploads:/app/uploads
      - model_cache:/app/model_cache
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - XENOVA_CACHE_DIR=/app/model_cache
      - TRANSFORMERS_CACHE=/app/model_cache
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.worker
    volumes:
      - ./backend/uploads:/app/uploads
      - model_cache:/app/model_cache
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - XENOVA_CACHE_DIR=/app/model_cache
      - TRANSFORMERS_CACHE=/app/model_cache
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  model_cache: